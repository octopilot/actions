name: Octopilot Pipeline

# Reusable "meta" pipeline: the generic Octopilot build DAG that any repo can
# adopt with a ~5-line caller. The application shape (languages, services,
# charts) is auto-detected from skaffold.yaml by detect-contexts, so this file
# is language- and repo-agnostic — the topology is invariant and only the
# matrices vary per repo.
#
# Fork-safe by construction: integration images/charts are pushed to ttl.sh
# (anonymous, namespace-free), so a fork's PR builds and pushes in the fork's
# own space with no upstream credentials. Callers pass `secrets: inherit` so any
# secret-dependent downstream job (e.g. a deploy) runs against the fork's own
# secrets, or is skipped when absent.
#
# Consume it from a caller with:
#   concurrency:                       # one run per ref; never cancel releases
#     group: octopilot-ci-${{ github.ref }}
#     cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}
#   jobs:
#     build:
#       uses: octopilot/actions/.github/workflows/pipeline.yml@v1
#       secrets: inherit
# then add repo-specific jobs (deploy, release) that `needs: build` and download
# the `integration-*` artifacts this workflow uploads.
#
# Concurrency lives in the CALLER (its run is the unit of cancellation);
# a reusable workflow cannot meaningfully group across callers.

on:
  workflow_call:
    inputs:
      runner:
        description: >
          Runner for all jobs. Either a single label string (default
          "ubuntu-latest") or a JSON array string for self-hosted label sets,
          e.g. '["self-hosted", "linux", "x64", "microscaler"]'. Self-hosted
          runners need docker + passwordless sudo (mold/musl apt installs);
          the low-disk reclaim step auto-skips on machines with real disks.
        type: string
        default: ubuntu-latest
      op_version:
        description: Octopilot `op` builder image version for artifact builds.
        type: string
        default: v1.1.2
      actions_ref:
        description: >
          Ref of octopilot/actions the composite steps resolve to. Defaults to
          main; pin (e.g. v1) alongside the reusable workflow for reproducibility.
        type: string
        default: main
      integration:
        description: >
          Opt in to the generic integration deploy (Kind + Flux HelmRelease).
          Set true only when the repo provides the documented integration bits:
          a Helm chart (detected from skaffold), a Flux overlay at `k8s/env/ci`
          whose HelmRelease injects images via ${IMG_<sanitized-image-name>}
          (an image basename `myapp-api` becomes ${IMG_myapp_api}) and the chart
          ref via ${CHART_OCI_URL} / ${CHART_REF_TYPE} / ${CHART_REF_VALUE},
          optional ephemeral deps at `hack/ci-deps/`, and an optional
          deployment-configuration profile (kustomization + SOPS secrets). See
          the Octopilot integration docs.
        type: boolean
        default: false
      namespace:
        description: "Target namespace for the integration deploy (default: repo name)."
        type: string
        default: ''
      profile:
        description: "deployment-configuration profile environment to apply (e.g. dev, ci)."
        type: string
        default: dev
    secrets:
      # Declared (not just inherited) so the secrets context is reliably wired
      # into this workflow across repos/orgs. Callers pass `secrets: inherit`.
      SOPS_AGE_KEY:
        description: age private key that decrypts the integration profile secrets.
        required: false
      ANTHROPIC_API_KEY:
        description: API key for AI-generated release notes (tags only).
        required: false
    outputs:
      pipeline-context:
        description: Detected pipeline context (JSON) from detect-contexts.
        value: ${{ jobs.detect.outputs.pipeline-context }}
      uuid:
        description: ttl.sh UUID naming the ephemeral integration artifacts.
        value: ${{ jobs.integration-validate.outputs.uuid }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Auto-detect languages and versions from skaffold.yaml ───────────────
  detect:
    name: Detect Contexts
    runs-on: ${{ (startsWith(inputs.runner, '[') && fromJSON(inputs.runner)) || inputs.runner }}
    # Hard cap — a hung test must fail the job, not burn 6h of runner time.
    timeout-minutes: 10
    outputs:
      pipeline-context: ${{ steps.detect.outputs.pipeline-context }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Contexts
        id: detect
        uses: octopilot/actions/detect-contexts@main

  # ── 2. Lint (pre-commit, language-aware) ───────────────────────────────────
  lint:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).languages) != '[]'
    name: Lint
    runs-on: ${{ (startsWith(inputs.runner, '[') && fromJSON(inputs.runner)) || inputs.runner }}
    # Hard cap — a hung test must fail the job, not burn 6h of runner time.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: octopilot/actions/lint@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}

  # ── 3. Test + Deliverables (one dynamic matrix from detect-contexts) ───────
  # The DAG renders exactly the legs that exist: detect-contexts emits every
  # entry with `kind` (test | deliverable) and a human `job_label`, and this
  # job dispatches per-entry. A repo without deliverables simply has no
  # deliverable legs — no ghost "skipped" node to raise eyebrows — and job
  # names never leak long synthesized commands.
  test:
    needs: detect
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).matrix) != '[]'
    name: ${{ matrix.job_label || 'Test' }}
    runs-on: ${{ (startsWith(inputs.runner, '[') && fromJSON(inputs.runner)) || inputs.runner }}
    # soft_fail legs (BP_TEST_SOFT_FAIL declared in skaffold) report honestly
    # but never block the pipeline — their label carries "advisory".
    continue-on-error: ${{ matrix.soft_fail == true }}
    # Hard cap — a hung test must fail the job, not burn 6h of runner time.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        if: matrix.kind != 'deliverable'
        uses: octopilot/actions/test@main
        with:
          pipeline-context: ${{ toJson(matrix) }}

      # Deliverable legs (meta-build functions routed by reserved suffix):
      # lib = "build and test it all" / verified rev; binary = release
      # binaries + dist assembly. Tag-gated publishing lands in a later phase.
      - name: Verify lib deliverable
        if: matrix.kind == 'deliverable' && matrix.type == 'lib'
        uses: octopilot/actions/deliverable-lib@main
        with:
          deliverable: ${{ toJson(matrix) }}

      - name: Build binary deliverable
        id: binary
        if: matrix.kind == 'deliverable' && matrix.type == 'binary'
        uses: octopilot/actions/deliverable-binary@main
        with:
          deliverable: ${{ toJson(matrix) }}

      - name: Upload binary dist
        if: matrix.kind == 'deliverable' && matrix.type == 'binary'
        uses: actions/upload-artifact@v4
        with:
          name: deliverable-${{ matrix.output_key }}
          path: ${{ steps.binary.outputs.dist-path }}
          retention-days: 7

  # ── 4a. Integration validate (release build + UUID for ttl.sh artifacts) ───
  integration-validate:
    name: Integration (validate)
    needs: [detect, lint, test]
    runs-on: ${{ (startsWith(inputs.runner, '[') && fromJSON(inputs.runner)) || inputs.runner }}
    # Hard cap — a hung test must fail the job, not burn 6h of runner time.
    timeout-minutes: 30
    outputs:
      uuid: ${{ steps.validate.outputs.uuid }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate primary build and generate UUID
        id: validate
        uses: octopilot/actions/integration-validate@main
        with:
          pipeline-context: ${{ needs.detect.outputs.pipeline-context }}

  # ── 4b. Integration artifacts (matrix from skaffold build.artifacts + chart) ─
  integration-artifacts:
    name: Integration (${{ matrix.suffix || matrix.output_key }})
    needs: [detect, integration-validate]
    if: toJSON(fromJson(needs.detect.outputs.pipeline-context).integration_matrix) != '[]'
    runs-on: ${{ (startsWith(inputs.runner, '[') && fromJSON(inputs.runner)) || inputs.runner }}
    # packages:write lets the job push the pack build-cache image to GHCR
    # (warm buildpack caches across ephemeral runners). Other permissions
    # revert to restrictive defaults once any permission is declared.
    permissions:
      contents: read
      packages: write
    # Hard cap — a hung test must fail the job, not burn 6h of runner time.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.pipeline-context).integration_matrix }}
    steps:
      - uses: actions/checkout@v4

      # Pack build-cache as a GHCR image: push + workflow_dispatch only — fork
      # PRs have no write token, and the cache needs a STABLE name across runs
      # (ttl.sh's per-run UUIDs are useless for caching). Old op versions
      # ignore the cache image harmlessly; op v1.0.18+ restores/exports it.
      - name: Login to GHCR for build cache
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && matrix.type == 'image'
        shell: bash
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Derive build-cache image name
        id: cache
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && matrix.type == 'image'
        shell: bash
        env:
          MATRIX_IMAGE: ${{ matrix.image }}
        run: |
          base="$(basename "${MATRIX_IMAGE%%:*}")"
          img="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${base}-buildcache"
          # GHCR chicken-and-egg: the lifecycle RESTORES (pulls) the cache
          # image before it ever exports one, and GITHUB_TOKEN gets DENIED
          # (not 404) pulling a package that has never existed — fatal to the
          # build. Bootstrap: push a tiny placeholder so the package exists
          # with the repo association; the lifecycle treats a metadata-less
          # cache image as empty and overwrites it on first export.
          # docker import needs a REAL tar stream (raw text -> "unexpected
          # EOF"), and the whole bootstrap is best-effort: any failure
          # degrades to a cacheless build instead of failing the job.
          if ! docker manifest inspect "$img:latest" >/dev/null 2>&1; then
            echo "Bootstrapping build-cache package (first run): $img"
            stage="$(mktemp -d)"
            echo 'octopilot buildcache bootstrap' > "$stage/.octopilot-buildcache-bootstrap"
            if ! { tar -C "$stage" -cf - . | docker import - "$img:latest" >/dev/null \
                   && docker push "$img:latest" >/dev/null 2>&1; }; then
              echo "::warning::build-cache bootstrap failed for $img — building without cache this run"
              echo "image=" >> "$GITHUB_OUTPUT"
              rm -rf "$stage"
              exit 0
            fi
            rm -rf "$stage"
          fi
          echo "image=$img" >> "$GITHUB_OUTPUT"

      - name: Build and push artifact
        id: build
        uses: octopilot/actions/integration-build-artifact@main
        with:
          artifact: ${{ toJson(matrix) }}
          ttl-uuid: ${{ needs.integration-validate.outputs.uuid }}
          op_version: ${{ inputs.op_version }}
          cache_image: ${{ steps.cache.outputs.image || '' }}

      - name: Upload artifact outputs
        run: |
          mkdir -p artifact-out
          mv outputs.txt "artifact-out/${{ matrix.output_key }}.txt" 2>/dev/null || true
          [ -f build_result.json ] && cp build_result.json artifact-out/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: integration-${{ matrix.output_key }}
          path: artifact-out
          retention-days: 1

  # ── 4c. Integration deploy (generic; opt-in via inputs.integration) ─────────
  # Stands the app up in Kind via a Flux HelmRelease, discovering every
  # repo-specific aspect from conventions + build_result.json so this workflow
  # stays repo-agnostic:
  #   • namespace      → repo name (or inputs.namespace)
  #   • images         → IMG_<sanitized-image-name> env vars for every non-chart
  #                      build; the repo's k8s/env/ci overlay consumes them
  #   • chart          → name/ref from the detected chart + the -chart build
  #   • Flux resources → discovered via `kubectl get ocirepository,helmrelease`
  #   • ci-deps        → hack/ci-deps/ applied if present
  #   • secret         → RERP runtime *.secrets.env decrypted; name read from
  #                      that profile's kustomization; skipped without SOPS_AGE_KEY
  integration-deploy:
    name: Integration (deploy)
    needs: [detect, integration-artifacts]
    if: ${{ inputs.integration }}
    runs-on: ${{ (startsWith(inputs.runner, '[') && fromJSON(inputs.runner)) || inputs.runner }}
    # Hard cap — a hung test must fail the job, not burn 6h of runner time.
    timeout-minutes: 45
    # Surface the (inherited) SOPS key via env so steps can gate on it — the
    # `secrets` context is not permitted in `if:` expressions.
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact outputs
        uses: actions/download-artifact@v4
        with:
          pattern: integration-*
          path: artifact-outputs

      - name: Merge build_result.json
        uses: octopilot/actions/merge-build-results@main
        with:
          directory: artifact-outputs
          output-path: build_result.json

      - name: Resolve deploy context (namespace, chart, images, secret)
        env:
          PIPELINE_CONTEXT: ${{ needs.detect.outputs.pipeline-context }}
          NS_INPUT: ${{ inputs.namespace }}
        run: |
          set -e
          NS="${NS_INPUT:-${GITHUB_REPOSITORY##*/}}"
          echo "NS=$NS" >> "$GITHUB_ENV"

          # Chart directory + name (detected chart_paths, else search the tree)
          CHART_DIR="$(echo "$PIPELINE_CONTEXT" | jq -r '.chart_paths[0] // ""')"
          [ -n "$CHART_DIR" ] || CHART_DIR="$(dirname "$(git ls-files '**/Chart.yaml' | head -1)")"
          CHART_NAME="$(grep -E '^name:' "$CHART_DIR/Chart.yaml" | sed 's/^name:[[:space:]]*//;s/[[:space:]]*$//')"

          # Chart OCI ref from the -chart build; normalise to Helm OCI shape.
          IMAGE_CHART="$(jq -r '.builds[] | select(.imageName|test("-chart$")) | .tag' build_result.json | head -1)"
          if ! echo "$IMAGE_CHART" | grep -qE "/${CHART_NAME}:"; then
            if echo "$IMAGE_CHART" | grep -qE -- '-chart:[^@]+'; then
              IMAGE_CHART="$(echo "$IMAGE_CHART" | sed "s|-chart:|-chart/${CHART_NAME}:|")"
            else
              echo "::error::Chart ref missing chart-name segment: $IMAGE_CHART"; exit 1
            fi
          fi
          if echo "$IMAGE_CHART" | grep -q '@sha256:'; then
            CHART_REF="oci://$(echo "$IMAGE_CHART" | sed 's/:[^@]*@/@/')"
          else
            CHART_REF="oci://${IMAGE_CHART}"
          fi
          {
            echo "CHART_OCI_URL=$(echo "$CHART_REF" | sed 's|^oci://||' | cut -d'@' -f1)"
            echo "CHART_REF_TYPE=digest"
            echo "CHART_REF_VALUE=$(echo "$CHART_REF" | sed 's|^oci://||' | cut -d'@' -f2)"
          } >> "$GITHUB_ENV"

          # IMG_<sanitized-image-name> for every non-chart image (envsubst input).
          jq -r '.builds[] | select((.imageName|test("-chart$"))|not) | "\(.imageName)\t\(.tag)"' build_result.json \
          | while IFS="$(printf '\t')" read -r name tag; do
              short="$(basename "$name")"
              # printf (not echo) so no trailing newline is turned into a "_".
              var="IMG_$(printf '%s' "$short" | tr -c 'A-Za-z0-9' '_')"
              echo "$var=$tag" >> "$GITHUB_ENV"
              echo "resolved $var=$tag"
            done

          echo "namespace=$NS  chart=$CHART_NAME  chart_ref=$CHART_REF"

      - name: Create Kind cluster (Kubernetes 1.34.3)
        uses: helm/kind-action@v1
        with:
          version: v0.31.0
          node_image: kindest/node:v1.34.3
          cluster_name: octopilot-integration
          wait: 120s

      - name: Setup kubectl
        uses: octopilot/actions/setup-tools@main
        with:
          kubectl_version: "1.34.3"

      - name: Namespace, deployment-configuration profile and ephemeral deps
        env:
          # Surfaced via env (not `secrets`) so a shell can test it; empty on a
          # fork PR without the key, in which case the profile decrypt is skipped.
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          PROFILE: ${{ inputs.profile }}
        run: |
          set -e
          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -

          # Apply the first customization (kustomization.yaml) under the selected
          # profile environment — it defines the app's config + secret with the
          # names the chart consumes (nothing hardcoded here). SOPS-encrypted
          # *.secrets.env are decrypted in place first; skipped without a key.
          PROFILE_ROOT="deployment-configuration/profiles/${PROFILE}"
          KUST="$(find "$PROFILE_ROOT" -name kustomization.yaml 2>/dev/null | sort | head -1 || true)"
          if [ -n "$KUST" ]; then
            PROFILE_DIR="$(dirname "$KUST")"
            echo "Applying profile customization: $PROFILE_DIR"
            if [ -n "${SOPS_AGE_KEY:-}" ]; then
              curl -fsSL -o /tmp/sops https://github.com/getsops/sops/releases/download/v3.9.1/sops-v3.9.1.linux.amd64
              chmod +x /tmp/sops
              printf '%s' "$SOPS_AGE_KEY" > /tmp/age.key
              for f in $(find "$PROFILE_DIR" -maxdepth 1 -name '*.secrets.env' 2>/dev/null); do
                echo "decrypting $f"
                SOPS_AGE_KEY_FILE=/tmp/age.key /tmp/sops --decrypt "$f" > "$f.dec" && mv "$f.dec" "$f"
              done
              rm -f /tmp/age.key
            else
              echo "SOPS_AGE_KEY not set — skipping secret decrypt (fork PR)."
            fi
            kubectl apply -k "$PROFILE_DIR"
          else
            echo "No kustomization under $PROFILE_ROOT — no config/secret to apply."
          fi

          if [ -d hack/ci-deps ]; then
            # ci-deps manifests are SELF-DESCRIBING: each object must declare
            # metadata.namespace explicitly. No -n flag here — kubectl refuses
            # objects whose declared namespace differs from -n, which breaks
            # legitimate cross-namespace shims (e.g. an ExternalName Service
            # aliasing a production-shaped hostname into the app namespace).
            # See docs/ECOSYSTEM-AND-DEPENDENCIES.md.
            kubectl apply -f hack/ci-deps/
            # Readiness: wait on the app namespace, plus any ci-deps-labelled
            # deployments in other namespaces (tier: ci-deps convention).
            kubectl wait --for=condition=available deploy --all -n "$NS" --timeout=180s || true
            kubectl wait --for=condition=available deploy -A -l tier=ci-deps --timeout=60s || true
          fi

      - name: Setup Flux in Kind
        uses: octopilot/actions/setup-flux@main
        with:
          export_path: /tmp/gotk-components.yaml

      - name: Deploy via Flux (discover + reconcile)
        run: |
          set -e
          RECONCILE_FAILED=0
          OVERLAY="k8s/env/ci"
          [ -d "$OVERLAY" ] || OVERLAY="$(dirname "$(git ls-files '**/env/ci/kustomization.yaml' | head -1)")"
          kubectl kustomize "$OVERLAY" | envsubst | kubectl apply -f -
          for oci in $(kubectl get ocirepository -n "$NS" -o name 2>/dev/null); do
            flux reconcile source oci "${oci##*/}" -n "$NS" --timeout=2m || RECONCILE_FAILED=1
          done
          for hr in $(kubectl get helmrelease -n "$NS" -o name 2>/dev/null); do
            flux reconcile helmrelease "${hr##*/}" -n "$NS" --timeout=8m || RECONCILE_FAILED=1
          done
          kubectl get all -n "$NS"
          flux get helmrelease -n "$NS" || true
          if [ "$RECONCILE_FAILED" -ne 0 ]; then
            echo "::group::Integration deploy diagnostics"
            kubectl logs -n flux-system -l app=helm-controller --tail=200 --all-containers=true 2>/dev/null || true
            kubectl get events -n "$NS" --sort-by='.lastTimestamp' 2>/dev/null | tail -80 || true
            kubectl describe pods -n "$NS" 2>/dev/null | tail -200 || true
            for j in $(kubectl get jobs -n "$NS" -o name 2>/dev/null); do
              echo "--- $j ---"; kubectl logs -n "$NS" "$j" --tail=100 2>/dev/null || true
            done
            for p in $(kubectl get pods -n "$NS" -o name 2>/dev/null); do
              echo "--- $p ---"; kubectl logs -n "$NS" "$p" --tail=60 --all-containers=true 2>/dev/null || true
            done
            flux get all -n "$NS" 2>/dev/null || true
            echo "::endgroup::"
            exit 1
          fi
