name: 'Collect Rust binaries'
description: >
  Copy top-level Cargo debug/release binaries (and shared libs) from the
  target directory into build_artifacts/{debug,release}/ for caching and
  downstream jobs. Does not copy deps/, incremental/, or *.rlib sidecars.
inputs:
  target-dir:
    description: >
      Cargo target directory (default: CARGO_TARGET_DIR or workspace target/).
    required: false
    default: ''
  out-dir:
    description: >
      Destination directory (default: ${GITHUB_WORKSPACE}/build_artifacts).
    required: false
    default: ''
  upload:
    description: >
      "per-binary" uploads every collected file of `upload-profile` as its OWN
      run artifact named <upload-prefix><binary> — downstream jobs then
      download exactly the binary they need (actions/download-artifact with
      name: bin-<binary>) instead of the whole build_artifacts tree.
      Default "none" (cache-only behaviour, unchanged).
    required: false
    default: 'none'
  upload-profile:
    description: Which profile dir to upload per-binary (release or debug).
    required: false
    default: 'release'
  upload-prefix:
    description: Artifact name prefix for per-binary uploads.
    required: false
    default: 'bin-'
  upload-retention-days:
    description: Retention for per-binary artifacts.
    required: false
    default: '7'
  append:
    description: >
      "1" (default) merges collected binaries ONTO the existing
      build_artifacts tree instead of wiping it first. Essential when
      build_artifacts rides a shared actions/cache: partial builds (a test
      leg that only compiled the crates its features touch) must not replace
      the fuller set a whole-workspace build collected — caches are
      first-writer-wins per key. Set "0" for replace semantics.
    required: false
    default: '1'
outputs:
  out-dir:
    description: Absolute path to build_artifacts.
    value: ${{ steps.collect.outputs.out-dir }}
  count:
    description: Number of files collected.
    value: ${{ steps.collect.outputs.count }}

runs:
  using: composite
  steps:
    - name: Collect binaries
      id: collect
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target-dir }}
        INPUT_OUT: ${{ inputs.out-dir }}
        COLLECT_APPEND: ${{ inputs.append }}
      run: |
        set -euo pipefail
        TARGET="${INPUT_TARGET:-${CARGO_TARGET_DIR:-$GITHUB_WORKSPACE/target}}"
        OUT="${INPUT_OUT:-$GITHUB_WORKSPACE/build_artifacts}"
        bash "${{ github.action_path }}/collect.sh" "$TARGET" "$OUT"
        count=0
        if [[ -f "$OUT/manifest.txt" ]]; then
          count="$(grep -c . "$OUT/manifest.txt" || true)"
        fi
        echo "out-dir=$OUT" >> "$GITHUB_OUTPUT"
        echo "count=$count" >> "$GITHUB_OUTPUT"

    # Per-binary artifacts: plain upload-artifact = one static step per
    # artifact, so a toolkit script drives N uploads from one step.
    - name: Upload per-binary artifacts
      if: inputs.upload == 'per-binary'
      shell: bash
      env:
        OUT_DIR: ${{ steps.collect.outputs.out-dir }}
        PROFILE: ${{ inputs.upload-profile }}
        PREFIX: ${{ inputs.upload-prefix }}
        RETENTION: ${{ inputs.upload-retention-days }}
      run: |
        set -euo pipefail
        SRC="$OUT_DIR/$PROFILE"
        if [ ! -d "$SRC" ] || [ -z "$(ls -A "$SRC" 2>/dev/null)" ]; then
          echo "No $PROFILE binaries under $OUT_DIR — skipping per-binary upload"
          exit 0
        fi
        TOOLDIR="$RUNNER_TEMP/octopilot-artifact-toolkit"
        if [ ! -d "$TOOLDIR/node_modules/@actions/artifact" ]; then
          mkdir -p "$TOOLDIR"
          (cd "$TOOLDIR" && npm init -y >/dev/null 2>&1 && npm install --no-audit --no-fund @actions/artifact@2 >/dev/null)
        fi
        NODE_PATH="$TOOLDIR/node_modules" node "${{ github.action_path }}/upload-each.mjs" \
          "$SRC" "$PREFIX" "$RETENTION"
